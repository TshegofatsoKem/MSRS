{% extends 'base.html' %}

{% block title %}Login | MSRS{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card shadow">
            <div class="card-header text-center" style="background-color: #1a3a2a; color: white;">
                <img src="{% load static %}{% static 'images/logo.png' %}" alt="Logo" style="height:60px;" class="mb-2">
                <h3 class="mb-0">Staff Login</h3>
                <p class="mb-0 mt-1">Magareng Service Request System</p>
            </div>
            <div class="card-body p-4">
                {% if error %}
                <div class="alert alert-danger">
                    <i class="fas fa-exclamation-circle me-2"></i>{{ error }}
                </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Username</label>
                        <input type="text" name="username" class="form-control form-control-lg"
                               placeholder="Enter your username" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Password</label>
                        <input type="password" name="password" class="form-control form-control-lg"
                               placeholder="Enter your password" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-sign-in-alt me-2"></i>Login
                        </button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center text-muted">
                <small>For staff access only | Bakeng sa basebetsi fela</small>
            </div>
        </div>
    </div>
</div>

{% endblock %}
